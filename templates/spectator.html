<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Spectator - Word Hunt</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Nunito+Sans:wght@700;800;900&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="{{ url_for('static', filename='styles.css') }}" />
  </head>
  <body class="game-page" data-view="spectator">
    <main class="spectator-layout">
      <header class="topbar">
        <div class="pill">Live Match</div>
        <div class="timer" id="timer">1:30</div>
        <div class="pill" id="status">Waiting</div>
      </header>

      <section class="duel-stage">
        <article class="spectator-side">
          <header class="side-head">
            <div class="pill player-pill">Player 1</div>
            <strong id="p1-score" class="side-score">0</strong>
          </header>
          <section class="board-shell spectator-board-shell">
            <div id="p1-board" class="board spectator-board"></div>
          </section>
          <section class="side-words">
            <h2>Player 1 Words</h2>
            <div id="p1-words" class="words"></div>
          </section>
        </article>

        <article class="spectator-side">
          <header class="side-head">
            <div class="pill player-pill">Player 2</div>
            <strong id="p2-score" class="side-score">0</strong>
          </header>
          <section class="board-shell spectator-board-shell">
            <div id="p2-board" class="board spectator-board"></div>
          </section>
          <section class="side-words">
            <h2>Player 2 Words</h2>
            <div id="p2-words" class="words"></div>
          </section>
        </article>
      </section>

      <p id="message" class="message" aria-live="polite"></p>

      <div class="actions">
        <button id="new-match" class="small-button">Start New Match</button>
        <a class="small-link" href="/play/1">Open Player 1</a>
        <a class="small-link" href="/play/2">Open Player 2</a>
      </div>
    </main>

    <script src="{{ url_for('static', filename='spectator.js') }}"></script>
  </body>
</html>
